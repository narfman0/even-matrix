name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run package

      - name: Rename artifact
        run: |
          VERSION=$(node -p "require('./app.json').version")
          cp out.ehpk even-matrix-${VERSION}.ehpk
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # On every push to master: update a rolling "latest" pre-release
      - name: Update latest pre-release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            --title "Latest build (v${{ env.VERSION }})" \
            --notes "Auto-built from \`$(git rev-parse --short HEAD)\` — $(git log -1 --pretty=%s)" \
            --prerelease \
            even-matrix-${{ env.VERSION }}.ehpk

      # On version tags: create a proper versioned release
      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "v${{ env.VERSION }}" \
            --generate-notes \
            even-matrix-${{ env.VERSION }}.ehpk
