services:
  # monocle — smart-glasses <-> Matrix orchestrator. Serves the EvenHub
  # plugin WebSocket on :4000. Secrets live in config.toml, which is
  # gitignored and mounted read-only at runtime (not baked into the image).
  # network_mode: host required when Matrix homeserver is on localhost.
  monocle:
    build: .
    image: monocle:latest
    container_name: monocle
    restart: unless-stopped
    network_mode: host
    volumes:
      # config.toml is gitignored — copy config.example.toml and fill in creds.
      - ./config.toml:/app/config.toml:ro
      # matrix-sdk persists session/sync state here (sqlite).
      - ./monocle-data:/app/data
