services:
  # even-matrix — smart-glasses <-> Matrix bridge. Serves the EvenHub
  # plugin WebSocket on :4000. Secrets live in config.toml, which is
  # gitignored and mounted read-only at runtime (not baked into the image).
  even-matrix:
    build: .
    image: even-matrix:latest
    container_name: even-matrix
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      MATRIX_HOMESERVER: "http://localhost:8008"
      # Optional: override whisper model path. Requires the models volume below.
      WHISPER_MODEL_PATH: "/app/models/ggml-small.bin"
    volumes:
      # config.toml is gitignored — copy config.example.toml and fill in creds.
      - ./config.toml:/app/config.toml:ro
      # matrix-sdk persists session/sync state here (sqlite).
      - ./even-matrix-data:/app/data
      # Whisper models directory — mount read-only. Download models to ./models/.
      - ./models:/app/models:ro
