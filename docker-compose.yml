services:
  # monocle — smart-glasses <-> Matrix orchestrator. Serves the EvenHub
  # plugin WebSocket on :4000. Secrets live in config.toml, which is
  # gitignored and mounted read-only at runtime (not baked into the image).
  monocle:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: monocle:latest
    container_name: monocle
    restart: unless-stopped
    ports:
      # Host port is overridable; container port must match [g2].port in config.toml (default 4000).
      - "${MONOCLE_PORT:-4000}:4000"
    volumes:
      # Copy config.example.toml -> config.toml and fill in your Matrix creds first.
      - ./config.toml:/config/config.toml:ro
